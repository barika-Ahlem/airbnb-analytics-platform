version: 2

models:
  - name: silver_hosts
    description: "Cleaned and typed hosts data"
    columns:
      - name: host_id
        description: "Host unique identifier"
        tests:
          - not_null
          - unique

  - name: silver_reviews
    description: "Cleaned reviews"
    columns:
      - name: listing_id
        tests:
          - not_null
      - name: review_date
        tests:
          - not_null
      - name: review_text
        tests:
          - not_null

  - name: silver_listings
    description: "Cleaned listings"
    columns:
      - name: listing_id
        tests:
          - not_null
          - unique
      - name: host_id
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: silver_full_moon_dates
    description: "Full moon dates"
    columns:
      - name: date_day
        tests:
          - not_null
          - unique
